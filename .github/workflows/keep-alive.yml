name: Keep Supabase Alive

# Pings the Supabase auth endpoint once a day so the free-tier project
# doesn't auto-pause after 7 days of inactivity (which causes data loss).
on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily
  workflow_dispatch:       # allow manual trigger too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth endpoint
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_KEY" \
            "$SUPABASE_URL/auth/v1/settings")
          echo "Supabase ping → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Supabase returned $STATUS — project may be paused"
            exit 1
          fi
