name: CI

# Runs TypeScript check + full test suite on every pull request.
# Blocks merge if either fails.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bun x tsc --noEmit

      - name: Run tests
        run: bun run test
        env:
          # Tests run against mocked Supabase, no real credentials needed.
          # These dummies satisfy the client init guard in supabase/client.ts.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          VITE_SUPABASE_PROJECT_ID: placeholder
